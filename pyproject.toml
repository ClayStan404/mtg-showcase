[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E501",  # 行长：中文注释/字符串常超，不强制
    "E402",  # import 位置：scripts 用 sys.path.insert 后再 import
]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
