name: Auto Update Inventory

on:
  push:
    branches: [master]
    # 纯文档改动不影响站点产物，跳过部署
    paths-ignore:
      - 'CLAUDE.md'
      - 'QWEN.md'
      - 'README.md'
  schedule:
    # 每小时整点运行（UTC，对应北京时间每小时一次）
    - cron: '0 * * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: read      # 只读 master 源码（不再 commit 回 master）
  pages: write        # 部署 Pages artifact
  id-token: write     # deploy-pages 需要签名
  issues: write       # 失败时创建/评论 issue 通知

# 防止 push / cron / 手动触发重叠，避免 self-hosted runner 工作区并发污染
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: self-hosted
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # 保留 .cache/scryfall 与上一份 data/*.json（未跟踪文件），
          # 供 load_previous_enrichment 复用 + Scryfall 磁盘缓存加速重建。
          # 默认 clean: true 会 git clean -ffdx 删掉这些 gitignored 缓存。
          clean: false

      - name: Fetch inventory xlsx from WPS
        run: |
          python3 scripts/fetch_wps_share.py --share-id cgyl3WizNfp7 --output wps_inventory.xlsx
          echo "✅ 在售 xlsx 下载完成"

      - name: Fetch wants xlsx from WPS
        run: |
          python3 scripts/fetch_wps_share.py --share-id cvvaN21e3gm8 --output wps_wants.xlsx
          echo "✅ 求购 xlsx 下载完成"

      - name: Parse inventory
        # 先清空旧产物，避免卖家从 WPS 删除工作表后旧 txt 残留导致站点展示已下架的卡
        run: |
          rm -f inventory/*.txt
          python3 scripts/parse_wps_excel.py wps_inventory.xlsx

      - name: Parse wants
        # 同上：清空旧 wants txt，避免已退出的买家残留
        run: |
          rm -f wants/*.txt
          python3 scripts/parse_wps_wants_excel.py wps_wants.xlsx

      - name: Build data (Scryfall enrichment)
        run: python3 scripts/build_data.py

      - name: Build wants data
        # 始终执行：build_wants.py 自身有空数据保护（写 count:0），
        # 跳过会让站点在求购文档清空后展示过期数据
        run: python3 scripts/build_wants.py

      - name: Assemble site
        # 组装干净站点目录：源码 + 产物 + CNAME（自定义域名 claystan.cc 必需）。
        # 不含 scripts/、.github/、templates/、site_config.json（已内嵌进 JSON）、文档。
        # 产物不入 git，每次部署现场生成后打包进 artifact。
        run: |
          rm -rf site
          mkdir -p site/assets site/data
          cp index.html site/
          cp -r assets/. site/assets/
          cp -r data/. site/data/
          cp CNAME site/
          cp LICENSE site/ 2>/dev/null || true
          echo "✅ 站点目录组装完成："
          ls -la site/ site/assets/ site/data/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Notify on failure
        # Cookie 过期是最高频故障；默认无通知会导致站点静默展示过期数据数天
        # 复用同一 open issue 评论，避免刷屏
        if: failure()
        run: |
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${{ github.run_id }}"
          BODY="自动部署失败，请检查。常见原因：WPS Cookie 过期（需从浏览器复制新值到 runner 的 ~/.config/wps_cookies.txt）。失败运行：${RUN_URL}"
          API="https://api.github.com/repos/${REPO}/issues"
          EXISTING=$(curl -s -H "Authorization: token ${TOKEN}" -H "Accept: application/vnd.github+json" \
            "${API}?state=open&per_page=100" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); m=[i['number'] for i in d if i.get('title')=='Auto-update failed']; print(m[0] if m else '')" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            curl -s -X POST -H "Authorization: token ${TOKEN}" -H "Accept: application/vnd.github+json" \
              "${API}/${EXISTING}/comments" -d "{\"body\":\"${BODY}\"}" >/dev/null
            echo "已评论现有 issue #${EXISTING}"
          else
            curl -s -X POST -H "Authorization: token ${TOKEN}" -H "Accept: application/vnd.github+json" \
              "${API}" -d "{\"title\":\"Auto-update failed\",\"body\":\"${BODY}\"}" >/dev/null
            echo "已创建新 issue"
          fi
