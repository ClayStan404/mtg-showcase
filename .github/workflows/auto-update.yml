name: Auto Update Inventory

on:
  push:
    branches: [master]
    # 纯文档改动不影响站点产物，跳过部署
    paths-ignore:
      - 'CLAUDE.md'
      - 'QWEN.md'
      - 'AGENTS.md'
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
      - 'pyproject.toml'
      - 'requirements-dev.txt'
      - 'tests/**'
      - '.github/dependabot.yml'
      - 'SECURITY.md'
      - 'docs/**'
      - 'SUPABASE_MIGRATION_PLAN.md'
  workflow_dispatch:  # 手动 / 小时 cron / admin「立即发布」
    # 不再用 GitHub schedule：官方文档明确 schedule 在整点高负载时会被延迟甚至丢弃
    # (实测本仓库 cron '0 *' 一天被跳过近一半，间隔常拉到 1.5–3h)。
    # 改由 self-hosted runner 本机 cron 每小时调 workflow_dispatch 触发
    # (runner-local trigger.sh，见 config_rc/infra/mtg-showcase/runner-cron.md)；heartbeat.yml
    # 仍在 GitHub 侧 2h 兜底告警（runner 离线 / cron 挂了都能捕获）。
    inputs:
      mode:
        description: "data = export+build+upload Storage only; full = also deploy Pages"
        required: false
        default: data
        type: choice
        options:
          - data
          - full

permissions:
  contents: read      # 只读 master 源码（不再 commit 回 master）
  pages: write        # 部署 Pages artifact
  id-token: write     # deploy-pages 需要签名
  issues: write       # 失败时创建/评论 issue 通知

# 防止 push / cron / 手动触发重叠，避免 self-hosted runner 工作区并发污染
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: self-hosted
    timeout-minutes: 30  # 防止挂起进程锁死 runner（默认 360min 太长）
    # Scheme C: push / mode=full → Pages deploy; dispatch default mode=data → Storage only.
    # Keep github-pages env always (deploy step is conditional; page_url empty on data-only).
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # 保留 .cache/scryfall 与上一份 data/*.json（未跟踪文件），
          # 供 load_previous_enrichment 复用 + Scryfall 磁盘缓存加速重建。
          # 默认 clean: true 会 git clean -ffdx 删掉这些 gitignored 缓存。
          clean: false
          # self-hosted runner 以 claystan 运行，checkout 出来的目录 owner 同为
          # claystan，不会触发 git dubious-ownership，set-safe-directory 多余。
          # 且 ~/.gitconfig 是软链，checkout 复制 gitconfig 时不 follow symlink
          # (actions/checkout#1706)，开启会写穿软链、每次 --add 累积重复条目
          # 污染 dotfiles 仓库。从源头关掉。
          set-safe-directory: false

      - name: Verify Python deps
        # 预检 runner apt 装的依赖；包丢失则早失败，避免半途 ImportError
        run: python3 -c "import requests; print('deps ok')"

      - name: Lint & test
        # 代码变更时跑 ruff + pytest（数据更新 cron 不跑，省时）
        if: github.event_name == 'push'
        run: |
          python3 -m venv /tmp/lint-venv
          /tmp/lint-venv/bin/pip install -q -r requirements-dev.txt
          /tmp/lint-venv/bin/ruff check scripts/ tests/
          /tmp/lint-venv/bin/pytest tests/ -q

      - name: Export inventory from Supabase
        # 从 Supabase 读 profiles + inventory（service_role bypass RLS），按 seller 写 inventory/{uid}.txt
        # 失败（0 seller / 全 profile 不全 / 请求失败）exit 非零，让 step 失败、不部署空站点
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          rm -f inventory/*.txt
          python3 scripts/export_inventory_to_txt.py

      - name: Export wants from Supabase
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          rm -f wants/*.txt
          python3 scripts/export_wants_to_txt.py

      - name: Clean stale Scryfall cache
        # 删除 60 天未访问的缓存文件，避免已售卡数据长期堆积
        run: find .cache/scryfall -type f -mtime +60 -delete 2>/dev/null || true

      - name: Build data (Scryfall enrichment)
        run: python3 scripts/build_data.py

      - name: Build wants data
        # 始终执行：build_wants.py 自身有空数据保护（写 count:0），
        # 跳过会让站点在求购文档清空后展示过期数据
        run: python3 scripts/build_wants.py

      - name: Sanity check enrichment
        # 防止 Scryfall/mtgch 宕机时静默部署降级数据（缺图/缺名）：
        # error 卡比例超 20% 则失败，触发 issue 通知
        run: |
          python3 - <<'PYEOF'
          import json
          # cards.json 的列表 key 是 'cards'，wants.json 是 'wants'（见 build_wants.py）
          # 用错 key 会让对应文件永远拿到空列表而跳过检查，使 20% 错误率保护失效
          for f, label, key in [('data/cards.json', 'inventory', 'cards'), ('data/wants.json', 'wants', 'wants')]:
              d = json.load(open(f))
              items = d.get(key, [])
              if not items:
                  print(f'{label}: empty')
                  continue
              errs = sum(1 for c in items if c.get('error'))
              ratio = errs / len(items)
              print(f'{label}: {errs}/{len(items)} error ({ratio:.0%})')
              if ratio > 0.2:
                  raise SystemExit(f'{label} error ratio {ratio:.0%} > 20%, aborting deploy')
          print('sanity check passed')
          PYEOF

      # Scheme C: always push snapshots to public Storage so the main site can
      # fetch fresh lists without a full Pages redeploy.
      - name: Upload site data to Supabase Storage
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/upload_site_data.py

      # Full site shell (HTML/JS/CSS) only on push, or explicit mode=full.
      # Data-only runs (admin publish / hourly cron) skip Pages entirely.
      - name: Assemble site
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        # 组装干净站点目录：源码 + 产物 + CNAME（自定义域名 claystan.cc 必需）。
        # 不含 scripts/、.github/、templates/、site_config.json（已内嵌进 JSON）、文档。
        # 产物不入 git，每次部署现场生成后打包进 artifact。
        run: |
          rm -rf site
          mkdir -p site/assets site/data
          cp index.html site/
          cp -r assets/. site/assets/
          cp -r data/. site/data/
          cp -r admin site/admin 2>/dev/null || true
          cp CNAME site/
          cp LICENSE site/ 2>/dev/null || true
          cp robots.txt site/ 2>/dev/null || true
          echo "✅ 站点目录组装完成："
          ls -la site/ site/assets/ site/data/

      - name: Configure Pages
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
        id: deploy
        uses: actions/deploy-pages@v5

      - name: Notify on failure
        # 默认无通知会导致站点静默展示过期数据数天
        # 复用同一 open issue 评论，避免刷屏
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request
          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['RUN_ID']}"
          body = f"自动部署/数据同步失败，请检查。常见原因：Supabase 请求失败 / SUPABASE_SERVICE_ROLE_KEY 未配或失效 / GH_PAT 失效 / Storage 上传失败。失败运行：{run_url}"
          api = f"https://api.github.com/repos/{repo}/issues"
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}
          list_ok = False
          existing = None
          try:
              req = urllib.request.Request(f"{api}?state=open&per_page=100", headers=headers)
              issues = json.load(urllib.request.urlopen(req, timeout=15))
              existing = next((i["number"] for i in issues if i.get("title") == "Auto-update failed"), None)
              list_ok = True
          except Exception as e:
              print(f"list issues failed: {e}")
          if existing is not None:
              num = str(existing)
              payload = json.dumps({"body": body}).encode()
              try:
                  creq = urllib.request.Request(f"{api}/{num}/comments", data=payload, headers=headers, method="POST")
                  urllib.request.urlopen(creq, timeout=15)
                  print(f"已评论现有 issue #{num}")
              except Exception as e:
                  print(f"comment failed: {e}")
          elif list_ok:
              payload = json.dumps({"title": "Auto-update failed", "body": body}).encode()
              try:
                  creq = urllib.request.Request(api, data=payload, headers=headers, method="POST")
                  urllib.request.urlopen(creq, timeout=15)
                  print("已创建新 issue")
              except Exception as e:
                  print(f"create issue failed: {e}")
          else:
              print("list issues failed, skipping create to avoid duplicates")
          PYEOF

      - name: Close issue on success
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request
          repo = os.environ["REPO"]
          token = os.environ["GITHUB_TOKEN"]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['RUN_ID']}"
          api = f"https://api.github.com/repos/{repo}/issues"
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}
          try:
              req = urllib.request.Request(f"{api}?state=open&per_page=100", headers=headers)
              issues = json.load(urllib.request.urlopen(req, timeout=15))
              existing = next((i["number"] for i in issues if i.get("title") == "Auto-update failed"), None)
          except Exception as e:
              print(f"list issues failed: {e}")
              existing = None
          if existing:
              try:
                  payload = json.dumps({"body": f"已恢复部署。成功运行：{run_url}"}).encode()
                  creq = urllib.request.Request(f"{api}/{existing}/comments", data=payload, headers=headers, method="POST")
                  urllib.request.urlopen(creq, timeout=15)
                  creq = urllib.request.Request(f"{api}/{existing}", data=json.dumps({"state": "closed"}).encode(), headers=headers, method="PATCH")
                  urllib.request.urlopen(creq, timeout=15)
                  print(f"已关闭 issue #{existing}")
              except Exception as e:
                  print(f"close issue failed: {e}")
          else:
              print("无 open 的 Auto-update failed issue，无需关闭")
          PYEOF
