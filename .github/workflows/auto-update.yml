name: Auto Update Inventory

on:
  schedule:
    # 每小时整点运行（UTC，对应北京时间每小时一次）
    - cron: '0 * * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write  # 允许 push commit

jobs:
  update:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python3 -m pip install -r requirements.txt

      - name: Fetch xlsx from WPS
        run: |
          python3 scripts/fetch_wps_share.py --output wps_inventory.xlsx
          echo "✅ xlsx 下载完成"

      - name: Parse inventory
        run: python3 scripts/parse_wps_excel.py wps_inventory.xlsx

      - name: Build data (Scryfall enrichment)
        run: python3 scripts/build_data.py

      - name: Build wants data
        run: |
          if ls wants/*.txt >/dev/null 2>&1; then
            python3 scripts/build_wants.py
          else
            echo "No wants files, skipping"
          fi

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add inventory/*.txt data/cards.json assets/cards-data.js
          if [ -f assets/wants-data.js ]; then
            git add data/wants.json assets/wants-data.js
          fi

          if git diff --staged --quiet; then
            echo "ℹ 无变更，跳过提交"
            exit 0
          fi

          COUNT=$(python3 -c "import json;print(json.load(open('data/cards.json'))['count'])")
          TOTAL=$(python3 -c "import json;print(json.load(open('data/cards.json'))['total_quantity'])")
          git commit -m "Auto update: ${COUNT} cards / ${TOTAL} total (WPS sync)"
          git push
          echo "✅ 已提交并推送：${COUNT} 种 / ${TOTAL} 张"
