name: Heartbeat

# Independent "is the site still updating?" alarm. GitHub does not notify on
# skipped crons; if the self-hosted runner is offline, auto-update fails silently.
# This workflow runs on GitHub-hosted runners (does not need self-hosted).
#
# Cadence: schedule only (every 2h). No workflow_run — fewer GitHub-hosted
# minutes; stale issue may stay open up to ~2h after recovery.

on:
  schedule:
    # Every 2 hours at :17 UTC
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  issues: write   # open/close issues
  actions: read   # list workflow runs

concurrency:
  group: heartbeat
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check auto-update freshness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          headers = {"Authorization": f"token {token}", "Accept": "application/vnd.github+json"}
          TITLE = "Auto-update stale（可能 runner 离线）"
          THRESHOLD_H = 2

          def api(method, url, data=None):
              body = json.dumps(data).encode() if data is not None else None
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              return json.load(urllib.request.urlopen(req, timeout=15))

          url = (
              f"https://api.github.com/repos/{repo}/actions/workflows/"
              f"auto-update.yml/runs?status=completed&conclusion=success&per_page=1"
          )
          runs = api("GET", url).get("workflow_runs", [])
          now = datetime.now(timezone.utc)
          if not runs:
              stale, age = True, "无成功记录"
          else:
              updated = datetime.fromisoformat(runs[0]["updated_at"].replace("Z", "+00:00"))
              age_h = (now - updated).total_seconds() / 3600
              stale, age = age_h > THRESHOLD_H, f"{age_h:.1f}h"
          print(f"auto-update 最近成功 run 距今 {age}; stale={stale}")

          issues = api("GET", f"https://api.github.com/repos/{repo}/issues?state=open&per_page=100")
          existing = next((i for i in issues if i.get("title") == TITLE), None)

          if stale:
              body = (
                  f"auto-update 已 {age} 无成功部署。可能原因：self-hosted runner 离线 / "
                  f"SUPABASE_SERVICE_ROLE_KEY 失效 / Scryfall/mtgch 不可达 / 构建失败。"
                  f"请检查 runner 与最近的失败 run。"
              )
              if existing:
                  updated = datetime.fromisoformat(existing["updated_at"].replace("Z", "+00:00"))
                  since_h = (now - updated).total_seconds() / 3600
                  if since_h < 6:
                      print(f"issue #{existing['number']} 最近 {since_h:.1f}h 已评论，跳过")
                  else:
                      api("POST", f"https://api.github.com/repos/{repo}/issues/{existing['number']}/comments", {"body": body})
                      print(f"已评论现有 issue #{existing['number']}")
              else:
                  api("POST", f"https://api.github.com/repos/{repo}/issues", {"title": TITLE, "body": body})
                  print("已创建新 issue")
          else:
              if existing:
                  api("PATCH", f"https://api.github.com/repos/{repo}/issues/{existing['number']}", {"state": "closed"})
                  print(f"已恢复，关闭 issue #{existing['number']}")
              else:
                  print("正常，无需操作")
          PYEOF
